<div class="extension_settings_drawer">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🎭 Dual Models (Диалоги и Описания)</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content" style="display: none;">
            
            <div class="flex-container" style="margin-bottom: 10px;">
                <label><input type="checkbox" id="dual_models_enable"> <b>Включить расширение</b></label>
            </div>
            
            <div id="dual_models_status" style="padding: 10px; margin-bottom: 10px; border-radius: 5px; display: none;">
                <span id="dual_models_status_text"></span>
            </div>
            
            <hr>
            
            <label>🌐 Proxy URL (например, http://127.0.0.1:5000/v1):</label>
            <input type="text" id="dual_models_url" class="text_pole" placeholder="http://127.0.0.1:5000/v1">

            <label>🔑 API Ключ пользователя:</label>
            <input type="password" id="dual_models_key" class="text_pole" placeholder="sk-...">

            <div style="margin: 15px 0;">
                <button id="dual_models_test_connection" class="menu_button">
                    🔌 Подключиться к прокси
                </button>
            </div>

            <hr>

            <div id="dual_models_model_selection" style="display: none;">
                <label>🗣️ Модель для диалогов:</label>
                <select id="dual_models_dialogue" class="text_pole">
                    <option value="">Выберите модель...</option>
                </select>

                <label>📖 Модель для описаний:</label>
                <select id="dual_models_action" class="text_pole">
                    <option value="">Выберите модель...</option>
                </select>

                <div style="margin: 15px 0;">
                    <button id="dual_models_confirm_models" class="menu_button" disabled>
                        ✅ Подтвердить выбор моделей
                    </button>
                </div>
            </div>
            
            <div style="margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 5px;">
                <small>💡 <b>Как использовать:</b><br>
                1. Подключитесь к прокси<br>
                2. Выберите две модели из списка<br>
                3. Подтвердите выбор<br>
                4. В чате появится кнопка <b>🎭</b> для двойной генерации</small>
            </div>
            
        </div>
    </div>
</div>
